name: Gemini Code Reviewer

on:
    pull_request:
        types: [opened, synchronize]

jobs:
    review:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get PR Diff (Filtered)
              id: diff
              run: |
                  # On ne prend que les fichiers de code, on exclut les PDF, les locks et les assets
                  git diff origin/${{ github.base_ref }} HEAD \
                    -- . ':(exclude)*-lock.json' ':(exclude)*.pdf' ':(exclude)*.svg' ':(exclude)*.png' \
                    > pr_diff.txt

                  # On vérifie la taille. Si c'est toujours trop gros (> 50k caractères), on tronque.
                  head -c 50000 pr_diff.txt > pr_diff_trimmed.txt

            - name: Gemini AI Review
              id: gemini
              run: |
                  # 1. Création des instructions
                  echo "Tu es un expert en audit de Smart Contracts Solidity. Analyse ce diff de PR. Focus : Sécurité, CEI, Gas. Sois bref." > instructions.txt

                  # 2. Construction du JSON sécurisé (jq gère l'échappement des caractères)
                  jq -n \
                    --slurpfile inst instructions.txt \
                    --rawfile diff pr_diff_trimmed.txt \
                    '{contents: [{parts: [{text: ($inst[0] + "\n\n" + $diff)}]}]}' > payload.json

                  # 3. Appel API (Lecture via fichier @)
                  curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
                    -H 'Content-Type: application/json' \
                    -d @payload.json > response.json

                  # 4. Extraction de la review dans un FICHIER (pas une variable env)
                  jq -r '.candidates[0].content.parts[0].text' response.json > review_result.md

            - name: Post Comment to PR
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: "## 🤖 Gemini Code Review\n\n" + process.env.REVIEW_RESULT
                      })
