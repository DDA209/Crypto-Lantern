name: Gemini Code Reviewer

on:
    pull_request:
        types: [opened, synchronize]

jobs:
    review:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            pull-requests: write
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get PR Diff
              id: diff
              run: |
                  # On récupère le diff et on le nettoie pour le JSON
                  git diff origin/${{ github.base_ref }} HEAD > pr_diff.txt
                  # On échappe les caractères spéciaux pour le payload JSON
                  echo "DIFF_CONTENT<<EOF" >> $GITHUB_ENV
                  cat pr_diff.txt >> $GITHUB_ENV
                  echo "EOF" >> $GITHUB_ENV

            - name: Gemini AI Review
              id: gemini
              run: |
                  # 1. Construction du prompt technique
                  PROMPT="Tu es un expert en audit de Smart Contracts Solidity et en sécurité DeFi et en développement Web 2 et Web 3 sur des solutions modernes. Analyse le diff suivant de ma Pull Request. Points de vigilance : 1. Respect du pattern Checks-Effects-Interactions (CEI). 2. Sécurité des transferts (SafeERC20). 3. Optimisation du Gaz. Sois concis et technique. Voici le code : \n\n ${{ env.DIFF_CONTENT }}"

                  # 2. Construction du payload JSON sans passer par des variables shell
                  # On utilise jq pour créer un JSON valide en lisant directement les fichiers
                  jq -n \
                    --slurpfile inst instructions.txt \
                    --slurpfile diff pr_diff.txt \
                    '{contents: [{parts: [{text: ($inst[0] + "\n\n" + $diff[0])}]}]}' > payload.json

                  # 3. Appel API en envoyant le fichier JSON directement
                  # On utilise -d @nomdufichier pour éviter la limite ARG_MAX
                  curl "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${{ secrets.GEMINI_API_KEY }}" \
                    -H 'Content-Type: application/json' \
                    -X POST \
                    -d @payload.json > response.json

                  # 4. Extraction de la réponse
                  REVIEW=$(jq -r '.candidates[0].content.parts[0].text // "Erreur: Pas de réponse de l'\''IA"' response.json)

                  # On sauvegarde pour le post-commentaire
                  {
                    echo "REVIEW_RESULT<<EOF"
                    echo "$REVIEW"
                    echo "EOF"
                  } >> $GITHUB_ENV

            - name: Post Comment to PR
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: "## 🤖 Gemini Code Review\n\n" + process.env.REVIEW_RESULT
                      })
